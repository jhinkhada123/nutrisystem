<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - NutriSystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-body">
    <!-- Sidebar Fixa -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon logo-icon-sm">NS</div>
            <h1 class="sidebar-title">NutriSystem</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Dashboard
            </a>
            <a href="pacientes.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Pacientes
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="btn-logout" class="btn btn-secondary btn-sm">Sair da conta</button>
        </div>
    </aside>

    <!-- Área Principal -->
    <main class="main-content">
        <header class="main-header" style="margin-bottom: 1.5rem;">
            <div>
                <h2>Pacientes</h2>
                <p class="subtitle" style="margin-bottom: 0;">Gerencie seus pacientes cadastrados</p>
            </div>
        </header>

        <div class="page-header-actions">
            <div class="search-box">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Buscar por paciente...">
            </div>
            <a href="novo-paciente.html" class="btn btn-primary" style="margin-top: 0; width: auto; padding: 0.75rem 1.5rem;">
                <svg style="margin-right: 8px;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Novo Paciente
            </a>
        </div>

        <div class="patients-grid-list" id="patients-list-container">
            <div class="empty-state">Carregando pacientes...</div>
            <!-- Dinâmico via JS -->
        </div>

    </main>

    <!-- Scripts -->
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pacientes.js"></script>
</body>
</html>
