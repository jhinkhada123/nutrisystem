<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriFlow - Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand">
                <div class="logo-icon">NF</div>
                <h1>NutriFlow</h1>
            </div>
            <h2>Criar Conta</h2>
            <p class="subtitle">Junte-se à revolução nutricional</p>

            <div id="alert-message" class="alert hidden"></div>

            <form id="signup-form">
                <div class="input-group">
                    <label for="name">Nome completo</label>
                    <input type="text" id="name" placeholder="Dra. Letícia Costa" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmar Senha</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary" id="btn-signup">Criar conta</button>
            </form>

            <div class="auth-links">
                <p>Já tem conta? <a href="index.html">Faça login</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
