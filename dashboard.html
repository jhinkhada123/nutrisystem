<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSystem - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-body">
    <!-- Sidebar Fixa -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon logo-icon-sm">NS</div>
            <h1 class="sidebar-title">NutriSystem</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Dashboard
            </a>
            <a href="pacientes.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Pacientes
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="btn-logout" class="btn btn-secondary btn-sm">Sair da conta</button>
        </div>
    </aside>

    <!-- Área Principal -->
    <main class="main-content">
        <header class="main-header">
            <div>
                <h2>Visão Geral</h2>
                <p class="subtitle" id="user-greeting">Carregando seus dados...</p>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Card 1 -->
            <div class="stat-card">
                <div class="stat-header">
                    <h3>Total de Pacientes Ativos</h3>
                    <div class="stat-icon bg-green-light">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                    </div>
                </div>
                <div class="stat-value" id="count-pacientes">-</div>
                <p class="stat-desc">Cadastrados atualmente</p>
            </div>

            <!-- Card 2 -->
            <div class="stat-card">
                <div class="stat-header">
                    <h3>Consultas da Semana</h3>
                    <div class="stat-icon bg-blue-light">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    </div>
                </div>
                <div class="stat-value" id="count-consultas">-</div>
                <p class="stat-desc">Registradas nesta semana</p>
            </div>
            
            <!-- Card 3 (Ocupa 2 colunas ou espaçamento extra em telas grandes) -->
            <div class="stat-card card-full-col">
                <div class="stat-header">
                    <h3>Pacientes sem retorno</h3>
                    <div class="stat-icon bg-orange-light">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </div>
                </div>
                <p class="stat-desc" style="margin-bottom: 1.5rem;">Última consulta há mais de 30 dias sem agendamento futuro.</p>
                
                <div class="patients-list" id="lista-sem-retorno">
                    <div class="empty-state">Buscando dados...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
